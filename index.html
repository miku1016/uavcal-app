<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAVCAL Webアプリ</title>
    <link rel="stylesheet" href="style.css">

    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="icon.png">   
</head>
<body>
    <div class="container">
        <h1>UAVCAL 計算ツール</h1>

        <div class="input-section">
            <label for="model">機種:</label>
            <select id="model">
                </select>
        </div>

        <div class="input-section">
            <label for="altitude">高度 m:</label>
            <input type="number" id="altitude" value="40" min="1">
        </div>

        <div class="input-section">
            <label for="overlap">オーバーラップ %:</label>
            <input type="number" id="overlap" value="80" min="0" max="100">
        </div>

        <div class="input-section">
            <label for="sidelap">サイドラップ %:</label>
            <input type="number" id="sidelap" value="70" min="0" max="100">
        </div>

        <div class="input-section">
            <label for="interval">撮影間隔 s:</label>
            <input type="number" id="interval" value="5" min="0.1" step="0.1">
        </div>

        <button id="calculateButton">計算</button>

        <h2>計算結果</h2>
        <div class="results-section">
            <div class="result-row">
                <span class="result-label">飛行速度:</span>
                <span id="flightSpeed" class="result-value">0.00</span>
                <span class="result-unit">m/s</span>
            </div>
            <div class="result-row">
                <span class="result-label">飛行ルート間隔:</span>
                <span id="flightRouteSpacing" class="result-value">0.00</span>
                <span class="result-unit">m</span>
            </div>
            <div class="result-row">
                <span class="result-label">水平サイズ:</span>
                <span id="horizontalSize" class="result-value">0.00</span>
                <span class="result-unit">m</span>
            </div>
            <div class="result-row">
                <span class="result-label">垂直サイズ:</span>
                <span id="verticalSize" class="result-value">0.00</span>
                <span class="result-unit">m</span>
            </div>
            <div class="result-row">
                <span class="result-label">地上画素サイズ:</span>
                <span id="gsd" class="result-value">0.00</span>
                <span class="result-unit">cm/pix</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
